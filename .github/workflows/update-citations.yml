name: Update Google Scholar citations

# Refreshes the citation numbers and "as of" date in index.html / main.js once a
# month, then commits to main. Vercel is connected to this repo, so the commit
# auto-deploys to production. You can also run it on demand from the Actions tab.

on:
  schedule:
    - cron: "0 8 1 * *"   # 08:00 UTC on the 1st of every month
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write          # allow the job to push the updated files

concurrency:
  group: update-citations
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Refresh citation numbers
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/update_citations.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No citation changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/main.js
          git commit -m "Update Google Scholar citations ($(date -u +%Y-%m-%d))"
          git push
